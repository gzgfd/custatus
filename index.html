<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Status</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f5f6f8;
    padding: 16px;
    color: #1a1f36;
  }

  .header {
    margin-bottom: 14px;
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:12px;
    flex-wrap:wrap;
  }
  .header-left h1 { font-size: 16px; font-weight: 800; }
  .header-left p { font-size: 11px; color: #6b7280; margin-top: 3px; }

  .header-right{
    display:flex;
    gap:8px;
    align-items:center;
    flex-wrap:wrap;
    justify-content:flex-end;
  }
  .pill{
    background:#fff;
    border:1px solid #e5e7eb;
    border-radius:999px;
    padding:8px 10px;
    font-size:11px;
    color:#374151;
    box-shadow: 0 1px 6px rgba(0,0,0,0.05);
    white-space:nowrap;
  }
  .pill span{ color:#6b7280; font-weight:600; margin-right:6px; }
  .pill strong{ font-variant-numeric: tabular-nums; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 10px;
  }

  a.card { text-decoration: none; color: inherit; }

  .card {
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    padding: 16px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: box-shadow 0.2s, transform 0.08s, opacity 0.2s;
    min-height: 104px;
  }
  .card:hover { box-shadow: 0 6px 16px rgba(0,0,0,0.08); transform: translateY(-1px); }

  .avatar {
    width: 42px; height: 42px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 900; color: #fff; flex-shrink: 0;
    position: relative;
  }
  .dot {
    position: absolute; bottom: -2px; right: -2px;
    width: 12px; height: 12px; border-radius: 50%;
    border: 2px solid #fff;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.06);
  }
  .dot.online { background: #22c55e; }
  .dot.offline { background: #9ca3af; }

  .info { flex: 1; min-width: 0; }
  .name { font-size: 14px; font-weight: 900; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .role { font-size: 11px; color: #6b7280; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .status-row{
    display:flex;
    align-items:center;
    gap:8px;
    margin-top: 6px;
    min-width:0;
  }
  .status-chip{
    display:inline-flex;
    align-items:center;
    gap:6px;
    padding: 5px 8px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 900;
    border: 1px solid transparent;
    white-space: nowrap;
  }
  .status-chip .mini-dot{
    width:8px;height:8px;border-radius:999px;
  }
  .status-chip.online{
    color:#166534;
    background: rgba(34,197,94,0.12);
    border-color: rgba(34,197,94,0.22);
  }
  .status-chip.online .mini-dot{ background:#22c55e; }
  .status-chip.offline{
    color:#374151;
    background: rgba(156,163,175,0.18);
    border-color: rgba(156,163,175,0.30);
  }
  .status-chip.offline .mini-dot{ background:#9ca3af; }

  .right { text-align: right; flex-shrink: 0; min-width: 92px; }
  .time { font-size: 14px; font-weight: 900; font-variant-numeric: tabular-nums; }
  .tz { font-size: 11px; color: #6b7280; margin-top: 1px; }

  .card.is-offline{
    background: #eef0f3;
    border-color: #cfd5dd;
    opacity: 0.82;
  }

  @media (prefers-reduced-motion: reduce){
    .card{ transition:none; }
    .card:hover{ transform:none; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>🟢 Team Availability</h1>
    <p id="summary"></p>
  </div>

  <div class="header-right">
    <div class="pill" title="Current time in Eastern Time (ET)">
      <span>ET now</span><strong id="etNow">—</strong>
    </div>
    <div class="pill" title="Standard hours">
      <span>Hours</span><strong>8:00 AM–5:00 PM</strong>
    </div>
  </div>
</div>

<div class="grid" id="grid"></div>

<script>
const team = [
  { name:"Greg Zwickl", role:"VP, Web Development", email:"greg.zwickl@gofishdigital.com", tzLabel:"ET", timeZone:"America/New_York", initials:"GZ", color:"#1e40af" },
  { name:"Maryam Ali", role:"Web Project Manager", email:"maryam.ali@gofishdigital.com", tzLabel:"ET", timeZone:"America/New_York", initials:"MA", color:"#7c3aed" },
  { name:"Laurentiu Danu", role:"Web Developer", email:"laurentiu.danu@gofishdigital.com", tzLabel:"EET/EEST", timeZone:"Europe/Bucharest", initials:"LD", color:"#3b82f6" },
  { name:"Erwin Bantilan", role:"Web Developer", email:"erwin.bantilan@gofishdigital.com", tzLabel:"PHT", timeZone:"Asia/Manila", initials:"EB", color:"#8b5cf6" },
  { name:"Corey King", role:"Web Developer", email:"corey.king@gofishdigital.com", tzLabel:"ET", timeZone:"America/New_York", initials:"CK", color:"#ec4899" },
  { name:"Eli Fuentes", role:"Jr. Web Developer", email:"elias.fuentes@gofishdigital.com", tzLabel:"PT", timeZone:"America/Los_Angeles", initials:"EF", color:"#14b8a6" },
  { name:"Sam Shumake", role:"Web Developer", email:"sam.shumake@gofishdigital.com", tzLabel:"ET", timeZone:"America/New_York", initials:"SS", color:"#f97316" },
  { name:"Vijay Mishra", role:"Web Developer", email:"vijay.mishra@gofishdigital.com", tzLabel:"ET", timeZone:"America/New_York", initials:"VM", color:"#0ea5e9" },
  { name:"Donald Ngo", role:"Web Production Analyst", email:"donald.ngo@gofishdigital.com", tzLabel:"PHT", timeZone:"Asia/Manila", initials:"DN", color:"#6366f1" },

  // If you still want Parker’s custom schedule in ET:
  { name:"Parker Jenkins", role:"Web Production Intern", email:"parker.jenkins@gofishdigital.com", tzLabel:"ET", timeZone:"America/New_York", initials:"PJ", color:"#84cc16",
    schedule:{0:null,1:[12,17],2:[12,17],3:[8,15],4:[12,17],5:null,6:null}
  },
];

const statusLabel = { online:"Online", offline:"Offline" };
const statusOrder = { online:0, offline:1 };

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function formatHHMM12(h, m){
  const period = h >= 12 ? "PM" : "AM";
  const dh = h === 0 ? 12 : h > 12 ? h - 12 : h;
  return dh + ":" + String(m).padStart(2,"0") + " " + period;
}

// DST-safe: get hour/minute/day-of-week in any IANA timezone
function getZonedParts(timeZone){
  const now = new Date();
  const parts = new Intl.DateTimeFormat("en-US", {
    timeZone,
    hour: "2-digit",
    minute: "2-digit",
    hour12: false,
    weekday: "short"
  }).formatToParts(now);

  const get = (type) => parts.find(p => p.type === type)?.value;
  const hour = parseInt(get("hour"), 10);
  const minute = parseInt(get("minute"), 10);
  const weekday = get("weekday"); // Sun, Mon, Tue...

  const dayMap = { Sun:0, Mon:1, Tue:2, Wed:3, Thu:4, Fri:5, Sat:6 };
  const day = dayMap[weekday];

  return { hour, minute, day };
}

function getEtNowString(){
  const now = new Date();
  return new Intl.DateTimeFormat("en-US", {
    timeZone: "America/New_York",
    hour: "numeric",
    minute: "2-digit",
    hour12: true
  }).format(now);
}

/**
 * Rules:
 * - Default: Online 8:00 AM–4:59 PM local time, weekdays only. Offline at 5:00 PM sharp.
 * - Parker: uses provided schedule (interpreted in his timeZone), offline otherwise.
 */
function getStatus(dev){
  const { hour:h, minute:m, day } = getZonedParts(dev.timeZone);
  const time = formatHHMM12(h, m);

  let status = "offline";

  if (dev.schedule){
    const hours = dev.schedule[day];
    if (hours && h >= hours[0] && h < hours[1]) status = "online";
  } else {
    const weekday = day >= 1 && day <= 5;
    if (weekday && h >= 8 && h < 17) status = "online"; // 8:00–16:59
  }

  return { status, time };
}

function update(){
  document.getElementById("etNow").textContent = getEtNowString();

  const sorted = [...team].sort((a,b) => statusOrder[getStatus(a).status] - statusOrder[getStatus(b).status]);
  const onlineCount = team.filter(d => getStatus(d).status === "online").length;
  document.getElementById("summary").textContent =
    onlineCount + " of " + team.length + " online · updates every minute";

  document.getElementById("grid").innerHTML = sorted.map(d => {
    const { status, time } = getStatus(d);
    const offlineClass = status === "offline" ? " is-offline" : "";
    return `<a class="card${offlineClass}" href="mailto:${escapeHtml(d.email)}" title="${escapeHtml(d.email)}">
      <div class="avatar" style="background:${escapeHtml(d.color)}">
        ${escapeHtml(d.initials)}
        <span class="dot ${status}"></span>
      </div>
      <div class="info">
        <div class="name">${escapeHtml(d.name)}</div>
        <div class="role">${escapeHtml(d.role)}</div>
        <div class="status-row">
          <div class="status-chip ${status}">
            <span class="mini-dot"></span>
            ${escapeHtml(statusLabel[status])}
          </div>
        </div>
      </div>
      <div class="right">
        <div class="time">${escapeHtml(time)}</div>
        <div class="tz">${escapeHtml(d.tzLabel)}</div>
      </div>
    </a>`;
  }).join("");
}

update();
setInterval(update, 60000);
</script>
</body>
</html>
